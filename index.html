<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Aluth Avurudu 2026 — සුභ අලුත් අවුරුද්ද</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=Noto+Serif+Sinhala:wght@300;400;700&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:'Crimson Pro',serif;cursor:none;}
@media(pointer:coarse){body{cursor:auto;}.cursor,.cursor-dot{display:none;}}

/* ── CUSTOM CURSOR ── */
.cursor{
  width:24px;height:24px;
  border:2px solid #FFE566;border-radius:50%;
  position:fixed;pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  transition:width .2s,height .2s,border-color .2s;
}
.cursor-dot{
  width:6px;height:6px;background:#FFE566;border-radius:50%;
  position:fixed;pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
}

/* ── CANVAS PARTICLES ── */
#particles{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:4;
}

/* ══════════════════════════════════════════
   HERO — full-screen, flex column layout
══════════════════════════════════════════ */
.hero{
  width:100vw;height:100vh;
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;
}

/* ── Backgrounds ── */
.bg-layer{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  transition:opacity 2s ease-in-out;opacity:0;z-index:0;
}
.bg-layer.active{opacity:1;}
.bg-overlay{
  position:absolute;inset:0;z-index:1;pointer-events:none;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,.55) 0%,
    rgba(0,0,0,.15) 30%,
    rgba(0,0,0,.25) 60%,
    rgba(0,0,0,.78) 100%
  );
}

/* ── Decorative rings ── */
.hero-bg-ring{
  position:absolute;border-radius:50%;
  top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;z-index:2;
  animation:ringPulse 8s ease-in-out infinite;
}
.hero-bg-ring:nth-child(1){width:min(400px,75vmin);height:min(400px,75vmin);border:1px solid rgba(255,215,80,.20);}
.hero-bg-ring:nth-child(2){width:min(680px,125vmin);height:min(680px,125vmin);border:1px solid rgba(255,215,80,.12);animation-delay:1.5s;}
.hero-bg-ring:nth-child(3){width:min(980px,180vmin);height:min(980px,180vmin);border:1px solid rgba(255,215,80,.07);animation-delay:3s;}
.hero-bg-ring:nth-child(4){width:min(1280px,235vmin);height:min(1280px,235vmin);border:1px solid rgba(255,215,80,.04);animation-delay:4.5s;}
@keyframes ringPulse{
  0%,100%{opacity:.3;transform:translate(-50%,-50%) scale(1);}
  50%{opacity:.85;transform:translate(-50%,-50%) scale(1.04);}
}

/* ══════════════════════════════════════════
   CASSIA TREES — MUCH BIGGER corner images
   clamp(min, preferred, max)
   preferred: ~28vw on wide, ~22vh on short
══════════════════════════════════════════ */
.cassia-tr{
  position:absolute;top:0;right:0;
  /* Responsive size: bigger on wide screens, controlled on mobile */
  width:clamp(110px, min(28vw, 36vh), 520px);
  z-index:9;pointer-events:none;
  opacity:0;
  transform:translate(30px,-30px) scale(.88);
  animation:
    cassiaIn 1.8s .3s cubic-bezier(.22,1,.36,1) forwards,
    cassiaSway 10s 2.5s ease-in-out infinite;
  filter:
    drop-shadow(0 14px 40px rgba(0,0,0,.80))
    drop-shadow(0 0 60px rgba(255,220,0,.26));
  transform-origin:top right;
}
.cassia-bl{
  position:absolute;top:0;left:0;
  width:clamp(110px, min(28vw, 36vh), 520px);
  z-index:9;pointer-events:none;
  opacity:0;
  transform:translate(-30px,-30px) scale(.88);
  animation:
    cassiaIn 1.8s .6s cubic-bezier(.22,1,.36,1) forwards,
    cassiaSway2 12s 3s ease-in-out infinite;
  filter:
    drop-shadow(0 10px 32px rgba(0,0,0,.80))
    drop-shadow(0 0 40px rgba(255,220,0,.18));
  transform-origin:top left;
}
.cassia-tr img,.cassia-bl img{width:100%;height:auto;display:block;}
.cassia-bl img{transform:scaleX(-1);}

@keyframes cassiaIn{to{opacity:1;transform:translate(0,0) scale(1);}}
@keyframes cassiaSway{
  0%,100%{transform:rotate(0deg) translateY(0);}
  35%{transform:rotate(2deg) translateY(-10px);}
  70%{transform:rotate(-1.2deg) translateY(-5px);}
}
@keyframes cassiaSway2{
  0%,100%{transform:rotate(0deg) translateY(0);}
  40%{transform:rotate(-1.6deg) translateY(-8px);}
  75%{transform:rotate(1.1deg) translateY(-4px);}
}

/* ══════════════════════════════════════════
   CHARACTER IMAGES — large side panels
   Match Image 1: girl fills right, rabana
   group fills left, both tall & prominent
══════════════════════════════════════════ */
.hero-float-images{
  position:absolute;inset:0;
  pointer-events:none;z-index:11;
}
.hfi{position:absolute;opacity:0;}
.hfi img{
  display:block;width:100%;height:100%;
  object-fit:contain;object-position:bottom center;
  filter:drop-shadow(0 16px 50px rgba(0,0,0,.88));
}

/* Girl — right side, tall, bottom-anchored */
.hfi-girl{
  width:clamp(160px, 27vw, 520px);
  height:clamp(220px, 78vh, 820px);
  bottom:0;right:0;
  animation:
    hfiR 1.4s 1.9s cubic-bezier(.22,1,.36,1) forwards,
    hfiBob2 8s 3.5s ease-in-out infinite;
}
/* Rabana group — left side, tall, bottom-anchored */
.hfi-rabana{
  width:clamp(160px, 27vw, 520px);
  height:clamp(220px, 78vh, 820px);
  bottom:0;left:0;
  animation:
    hfiL 1.4s 2.2s cubic-bezier(.22,1,.36,1) forwards,
    hfiBob1 9s 3.8s ease-in-out infinite;
}

@keyframes hfiR{from{opacity:0;transform:translate(50px,40px) scale(.82);}to{opacity:1;transform:translate(0,0) scale(1);}}
@keyframes hfiCenter{from{opacity:0;transform:translateX(-50%) translateY(30px) scale(.82);}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}}
@keyframes hfiBobCenter{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-12px);}}
@keyframes hfiL{from{opacity:0;transform:translate(-50px,40px) scale(.82);}to{opacity:1;transform:translate(0,0) scale(1);}}
@keyframes hfiBob1{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}
@keyframes hfiBob2{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}

/* ── CROWS ── */
.crow{position:absolute;z-index:13;pointer-events:none;width:clamp(20px,2.8vmin,48px);animation:crowFly 14s ease-in-out infinite;}
.crow2{position:absolute;z-index:13;pointer-events:none;width:clamp(16px,2.2vmin,38px);animation:crowFly2 18s 7s ease-in-out infinite;}
.crow-svg{animation:wingFlap .35s ease-in-out infinite alternate;}
.crow2 .crow-svg{animation:wingFlap .4s .12s ease-in-out infinite alternate;}
@keyframes crowFly{
  0%{left:-8%;top:14%;opacity:0;}5%{opacity:1;}
  30%{left:28%;top:9%;}60%{left:58%;top:15%;}
  88%{left:88%;top:11%;opacity:1;}95%,100%{left:110%;top:9%;opacity:0;}
}
@keyframes crowFly2{
  0%{left:-8%;top:20%;opacity:0;}5%{opacity:1;}
  35%{left:35%;top:13%;}65%{left:65%;top:20%;}
  90%{left:108%;top:15%;opacity:1;}100%{left:108%;top:15%;opacity:0;}
}
@keyframes wingFlap{0%{transform:scaleY(1);}100%{transform:scaleY(.5);}}

/* ══════════════════════════════════════════
   ROW 1 — COUNTDOWN BAR (top)
══════════════════════════════════════════ */
.hero-countdown-bar{
  position:relative;z-index:25;
  display:flex;flex-direction:column;align-items:center;
  gap:clamp(.08rem,.3vh,.35rem);
  opacity:0;animation:fadeSlideDown 1s .6s cubic-bezier(.65,0,.35,1) forwards;
  padding:clamp(.5rem,1.5vh,1.1rem) 1rem clamp(.2rem,.5vh,.5rem);
  width:100%;
}
@keyframes fadeSlideDown{from{opacity:0;transform:translateY(-12px);}to{opacity:1;transform:translateY(0);}}

.countdown-label{
  font-family:'Cinzel',serif;
  font-size:clamp(.38rem,.9vw,.75rem);
  letter-spacing:.26em;text-transform:uppercase;
  background:linear-gradient(90deg,#FFD700,#FFFACD,#FF8C00);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 1px 6px rgba(0,0,0,.85));
}

.countdown{
  display:flex;gap:clamp(.12rem,.45vw,.55rem);
  align-items:center;justify-content:center;flex-wrap:nowrap;
}

.cd-block{
  display:flex;flex-direction:column;align-items:center;
  background:rgba(0,0,0,.52);
  border:1.5px solid rgba(255,215,80,.80);
  border-top:3px solid rgba(255,235,80,1);
  border-radius:clamp(4px,.8vw,10px);
  padding:clamp(.2rem,.5vh,.55rem) clamp(.35rem,1vw,1rem);
  min-width:clamp(40px,7vw,90px);
  backdrop-filter:blur(18px);
  position:relative;overflow:hidden;
  transition:transform .25s,box-shadow .25s;
}
.cd-block:hover{transform:translateY(-4px) scale(1.05);box-shadow:0 8px 28px rgba(255,210,0,.32);}
.cd-block::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,235,0,.28) 0%,transparent 55%);
}
.cd-num{
  font-family:'Cinzel Decorative',cursive;
  font-size:clamp(.9rem,3.2vw,2.8rem);font-weight:700;
  background:linear-gradient(180deg,#FFF9A0 0%,#FFD700 50%,#FFA500 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 10px rgba(255,200,0,.75));
  line-height:1;position:relative;
}
.cd-num.update{animation:tick .3s ease;}
@keyframes tick{0%{transform:scale(1);}50%{transform:scale(1.18);}100%{transform:scale(1);}}
.cd-unit{
  font-family:'Cinzel',serif;
  font-size:clamp(.22rem,.5vw,.56rem);
  letter-spacing:.2em;text-transform:uppercase;
  color:rgba(255,245,175,.95);
  margin-top:.1rem;position:relative;
}
.cd-sep{
  font-family:'Cinzel Decorative',cursive;
  font-size:clamp(.65rem,2vw,1.8rem);font-weight:700;
  background:linear-gradient(180deg,#FFF176,#FFD700);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 12px rgba(255,210,0,.8));
  margin-bottom:clamp(.14rem,.35vh,.4rem);
}
.countdown-event{
  font-family:'Noto Serif Sinhala',serif;
  font-size:clamp(.34rem,.95vw,.82rem);
  background:linear-gradient(90deg,#FFFDE7,#FFD54F,#FFFDE7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 1px 8px rgba(0,0,0,.95));
  text-align:center;margin-top:.12rem;
}

/* ══════════════════════════════════════════
   ROW 2 — CENTER CONTENT (sun + title)
══════════════════════════════════════════ */
.hero-center{
  position:relative;z-index:10;
  flex:1;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:clamp(.6rem,2vh,2rem) clamp(.5rem,2vw,2.5rem) 0;
  gap:clamp(.08rem,.4vh,.5rem);
  pointer-events:none;
  min-height:0;
}

/* ── Sun ── */
.sun-wrapper{
  position:relative;
  width:clamp(140px,34vmin,620px);
  height:clamp(140px,34vmin,620px);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  animation:sunFloat 6s ease-in-out infinite;z-index:20;
  /* pull sun slightly up so it doesn't crowd the title */
  margin-bottom:clamp(-10px,-1.5vmin,-4px);
}
@keyframes sunFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-16px);}}

.ray-burst{
  position:absolute;
  width:min(900px,95vmin);height:min(900px,95vmin);
  top:50%;left:50%;transform:translate(-50%,-50%);
  background:conic-gradient(
    from 0deg,
    transparent 0deg,rgba(255,220,0,.13) 4deg,transparent 8deg,
    transparent 16deg,rgba(255,240,80,.08) 20deg,transparent 24deg,
    transparent 32deg,rgba(255,200,0,.13) 36deg,transparent 40deg,
    transparent 48deg,rgba(255,220,0,.14) 52deg,transparent 56deg,
    transparent 64deg,rgba(255,240,60,.09) 68deg,transparent 72deg,
    transparent 80deg,rgba(255,210,0,.14) 84deg,transparent 88deg,
    transparent 96deg,rgba(255,220,0,.13) 100deg,transparent 104deg,
    transparent 112deg,rgba(255,240,80,.11) 116deg,transparent 120deg,
    transparent 128deg,rgba(255,200,0,.12) 132deg,transparent 136deg,
    transparent 144deg,rgba(255,220,0,.15) 148deg,transparent 152deg,
    transparent 160deg,rgba(255,240,60,.11) 164deg,transparent 168deg,
    transparent 176deg,rgba(255,200,0,.13) 180deg,transparent 184deg,
    transparent 192deg,rgba(255,220,0,.14) 196deg,transparent 200deg,
    transparent 208deg,rgba(255,240,80,.12) 212deg,transparent 216deg,
    transparent 224deg,rgba(255,200,0,.13) 228deg,transparent 232deg,
    transparent 240deg,rgba(255,220,0,.12) 244deg,transparent 248deg,
    transparent 256deg,rgba(255,240,60,.14) 260deg,transparent 264deg,
    transparent 272deg,rgba(255,200,0,.13) 276deg,transparent 280deg,
    transparent 288deg,rgba(255,220,0,.14) 292deg,transparent 296deg,
    transparent 304deg,rgba(255,240,80,.11) 308deg,transparent 312deg,
    transparent 320deg,rgba(255,200,0,.14) 324deg,transparent 328deg,
    transparent 336deg,rgba(255,220,0,.13) 340deg,transparent 344deg,
    transparent 352deg,rgba(255,240,60,.12) 356deg,transparent 360deg
  );
  border-radius:50%;
  animation:raySpin 32s linear infinite;
  z-index:0;pointer-events:none;
}
@keyframes raySpin{from{transform:translate(-50%,-50%) rotate(0);}to{transform:translate(-50%,-50%) rotate(360deg);}}

/* Wide golden halo behind the sun */
.sun-halo{
  position:absolute;
  width:calc(100% + 160px);height:calc(100% + 160px);
  top:50%;left:50%;transform:translate(-50%,-50%);
  border-radius:50%;
  background:radial-gradient(
    circle,
    rgba(255,240,120,.55) 0%,
    rgba(255,200,0,.35) 20%,
    rgba(255,150,0,.18) 42%,
    rgba(255,90,0,.06) 62%,
    transparent 76%
  );
  animation:glowPulse 3.5s ease-in-out infinite;
  z-index:1;pointer-events:none;
}
@keyframes glowPulse{
  0%,100%{opacity:.75;transform:translate(-50%,-50%) scale(1);}
  50%{opacity:1;transform:translate(-50%,-50%) scale(1.18);}
}
.sun-container{position:relative;width:100%;height:100%;z-index:20;}
.sun-img{
  width:100%;height:100%;object-fit:contain;
  filter:
    drop-shadow(0 0 28px rgba(255,230,0,1))
    drop-shadow(0 0 70px rgba(255,170,0,.80))
    drop-shadow(0 0 130px rgba(255,110,0,.45))
    drop-shadow(0 0 200px rgba(255,80,0,.20));
}

/* ── Text block — transparent, no box ── */
.hero-text-block{
  display:flex;flex-direction:column;align-items:center;
  gap:clamp(.3rem,.8vh,.9rem);
  opacity:0;
  animation:fadeTitleIn 1.3s .55s cubic-bezier(.22,1,.36,1) forwards;
  pointer-events:none;
  background:none;
  padding:0 clamp(1rem,4vw,3rem);
}

/* ── Title ── */
.hero-title{
  text-align:center;
  width:clamp(260px,80vw,860px);
  pointer-events:none;
  margin:0;
}
@keyframes fadeTitleIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

.hero-title .line1{
  display:block;
  font-family:'Cinzel Decorative',cursive;
  font-size:clamp(1.6rem,7.5vmin,8rem);
  font-weight:900;
  color:#ffffff;
  text-shadow:
    0 2px 6px rgba(0,0,0,.95),
    0 5px 28px rgba(0,0,0,.90),
    0 0 70px rgba(255,200,0,.18);
  line-height:1.22;letter-spacing:.04em;
  margin-bottom:clamp(.3rem,1vh,.8rem);
}
.hero-title .line2{
  display:block;
  font-family:'Noto Serif Sinhala',serif;
  font-size:clamp(1rem,3.8vmin,3.8rem);
  color:#ffffff;
  text-shadow:
    0 2px 6px rgba(0,0,0,.95),
    0 5px 24px rgba(0,0,0,.90);
  margin-top:clamp(.4rem,1.2vh,1rem);
  margin-bottom:clamp(.3rem,1vh,.8rem);
  letter-spacing:.06em;
}

/* ── Divider ── */
.hero-divider{
  display:flex;align-items:center;
  gap:clamp(.5rem,1.6vw,1.4rem);
  z-index:10;
}
.hero-divider span.star{
  font-size:clamp(.9rem,2vmin,2.4rem);
  color:rgba(255,220,80,.9);
  filter:drop-shadow(0 0 8px rgba(255,200,0,.6));
}
.hero-divider .dline{
  width:clamp(28px,6vw,110px);height:1.5px;
  background:linear-gradient(90deg,transparent,rgba(255,215,80,.75),transparent);
}
.year-text{
  font-family:'Cinzel Decorative',cursive;
  font-size:clamp(1.3rem,4.2vmin,4rem);
  letter-spacing:.32em;
  background:linear-gradient(180deg,#FFF5A0,#FFD700,#FFC200);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 18px rgba(255,200,0,.65));
}

/* ══════════════════════════════════════════
   ROW 3 — BG SWITCHER dots (bottom)
══════════════════════════════════════════ */
.bg-switcher{
  position:relative;z-index:20;
  display:flex;flex-direction:column;align-items:center;
  padding-bottom:clamp(.7rem,1.8vh,1.5rem);
  gap:.4rem;
  opacity:0;animation:fadeUp .8s 1.5s ease forwards;
}
.bg-dots{display:flex;gap:10px;}
.bg-dot{
  width:11px;height:11px;border-radius:50%;
  background:rgba(255,215,80,.3);
  border:1.5px solid rgba(255,215,80,.6);
  cursor:pointer;transition:background .3s,transform .2s;
}
.bg-dot.on{background:rgba(255,215,80,.95);transform:scale(1.3);}
.bg-dot:hover{background:rgba(255,215,80,.7);}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ── FIREWORKS ── */
.firework{
  position:fixed;pointer-events:none;z-index:1000;
  border-radius:50%;
  animation:fireworkBurst 1s ease-out forwards;
}
@keyframes fireworkBurst{
  0%{opacity:1;transform:scale(0) translate(0,0);}
  100%{opacity:0;transform:scale(1) var(--translate);}
}

/* ══════════════════════════════════════════
   RESPONSIVE BREAKPOINTS
══════════════════════════════════════════ */

/* ── Tablets (768px and below) ── */
@media(max-width:768px){
  .cassia-tr,.cassia-bl{width:clamp(90px,22vw,260px);}
  .hfi-girl{width:clamp(150px,26vw,360px);height:clamp(200px,72vh,580px);}
  .hfi-rabana{width:clamp(150px,26vw,360px);height:clamp(200px,72vh,580px);}

  /* Countdown: slightly smaller text on tablets */
  .cd-num{font-size:clamp(.85rem,2.8vw,2.4rem);}
  .cd-unit{font-size:clamp(.2rem,.45vw,.5rem);}
  .countdown-label{font-size:clamp(.34rem,.8vw,.68rem);}
  .countdown-event{font-size:clamp(.32rem,.85vw,.74rem);}
}

/* ── Mobile portrait (480px and below) ── */
@media(max-width:480px){
  /* ── Cassia trees ── */
  .cassia-tr,.cassia-bl{width:clamp(80px,32vw,170px);}

  /* ── Rabana group: hide on small mobile, girl takes focus ── */
  .hero-float-images{
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    width:100%;
    height:auto;
    display:flex;
    flex-direction:row;
    align-items:flex-end;
    justify-content:center;
    gap:0;
    transform:none;
  }

  /* Man — left of center */
  .hfi-rabana{
    display:block;
    inset:auto !important;
   width: clamp(260px, 75vw, 520px);
height: clamp(420px, 80vh, 650px);
    flex-shrink:0;
    margin-left:-32%;
    
    transform:none !important;
    z-index:12;
    animation:hfiL 1.4s 2.2s cubic-bezier(.22,1,.36,1) forwards,hfiBob1 9s 3.8s ease-in-out infinite;
  }

  /* Girl — right of center, slightly taller, in front */
  .hfi-girl{
    inset:auto !important;
    width: clamp(260px, 75vw, 520px);
height: clamp(420px, 80vh, 650px);
    flex-shrink:0;
    margin-right:-20%;
    transform:none !important;
    z-index:13;
    animation:
      hfiR 1.4s 1.9s cubic-bezier(.22,1,.36,1) forwards,
      hfiBob2 8s 3.5s ease-in-out infinite !important;
  }

  /* ── Countdown: tight 4-block row, no overflow ── */
  .countdown{gap:clamp(.08rem,1.2vw,.4rem);}
  .cd-block{
    min-width:clamp(44px,17vw,78px);
    padding:clamp(.2rem,.8vh,.5rem) clamp(.2rem,1.8vw,.55rem);
    border-radius:6px;
  }
  .cd-num{font-size:clamp(.95rem,6vw,2rem);line-height:1;}
  .cd-unit{font-size:clamp(.19rem,2vw,.44rem);letter-spacing:.1em;}
  .cd-sep{font-size:clamp(.55rem,4.5vw,1.2rem);margin-bottom:.2rem;}
  .countdown-label{display:none;}
  .countdown-event{
    font-size:clamp(.32rem,2.1vw,.58rem);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:94vw;
    text-align:center;
    letter-spacing:.04em;
  }
  .hero-countdown-bar{padding:clamp(1.2rem,4vh,2.5rem) clamp(.5rem,3vw,1.2rem) clamp(.2rem,.5vh,.4rem);}

  /* ── Sun ── */
  .sun-wrapper{width:clamp(100px,30vw,180px);height:clamp(100px,30vw,180px);}

  /* ── Title ── */
  .hero-title .line1{font-size:clamp(1rem,6.5vw,2rem);}
  .hero-title .line2{font-size:clamp(.6rem,4vw,1.1rem);}
  .year-text{font-size:clamp(.9rem,5vw,1.5rem);}
  .hero-center{gap:clamp(.15rem,.5vh,.5rem);}
}

/* ── Small mobile (360px and below) ── */
@media(max-width:360px){
  .hfi-girl{width:clamp(230px,88vw,360px);height:clamp(300px,84vh,520px);left:50%;right:auto;transform:translateX(-50%);}
  .cd-num{font-size:clamp(.78rem,5vw,1.5rem);}
  .hero-title .line1{font-size:clamp(.9rem,6vw,1.7rem);}
}

/* ── Landscape short screens ── */
@media(max-height:520px){
  .hero-countdown-bar{padding-top:.3rem;padding-bottom:.1rem;gap:.06rem;}
  .countdown-label{display:none;}
  .countdown-event{display:none;}
  .cd-sep{font-size:.6rem;}
  .hero-center{gap:.06rem;}
  .sun-wrapper{width:clamp(55px,14vh,120px);height:clamp(55px,14vh,120px);margin-bottom:0;}
  .hero-title .line2{display:none;}
  .hero-text-block{padding:.4rem 1rem;background:none;}
  .cassia-tr,.cassia-bl{width:clamp(60px,15vh,150px);}
  .hfi-girl{
    width:clamp(120px,25vh,220px);height:clamp(140px,80vh,360px);
    right:0;transform:none;
  }
  .hfi-rabana{display:block;width:clamp(130px,28vh,260px);height:clamp(130px,75vh,340px);}
}

/* ── Very short landscape (phone landscape) ── */
@media(max-height:400px){
  .hero-title .line1{font-size:clamp(.7rem,3.5vh,1.6rem);}
  .cd-num{font-size:clamp(.75rem,2.8vh,1.4rem);}
  .cassia-tr,.cassia-bl{width:clamp(50px,13vh,120px);}
  .hfi-girl{width:clamp(100px,22vh,180px);height:clamp(120px,80vh,280px);right:0;transform:none;}
  .hfi-rabana{display:block;width:clamp(110px,24vh,210px);height:clamp(110px,75vh,270px);}
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-dot" id="cursorDot"></div>
<canvas id="particles"></canvas>

<section class="hero" id="scene">
  <!-- Backgrounds -->
  <div class="bg-layer" id="bg0"></div>
  <div class="bg-layer" id="bg1"></div>
  <div class="bg-overlay"></div>

  <!-- Rings -->
  <div class="hero-bg-ring"></div>
  <div class="hero-bg-ring"></div>
  <div class="hero-bg-ring"></div>
  <div class="hero-bg-ring"></div>

  <!-- Cassia Trees — top corners -->
  <div class="cassia-tr">
    <img src="assets/Cassia_Fistula_Tree.png" alt="Cassia Fistula">
  </div>
  <div class="cassia-bl">
    <img src="assets/Cassia_Fistula_Tree.png" alt="Cassia Fistula">
  </div>

  <!-- Character images — bottom corners -->
  <div class="hero-float-images">
    <div class="hfi hfi-girl">
      <img src="assets/Girl.png" alt="Avurudu Girl">
    </div>
    <div class="hfi hfi-rabana">
      <img src="assets/Playing_the_Rabana___Raban_Gaseema__1_-removebg-preview.png" alt="Rabana">
    </div>
  </div>

  <!-- Crows -->
  <div class="crow">
    <svg class="crow-svg" viewBox="0 0 52 28" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="26" cy="18" rx="14" ry="8" fill="#111"/>
      <circle cx="40" cy="14" r="7" fill="#111"/>
      <path d="M46,13 L55,12 L46,16Z" fill="#1A1A1A"/>
      <circle cx="42" cy="13" r="2" fill="#fff"/>
      <circle cx="43" cy="13" r="1" fill="#000"/>
      <path d="M26,14 Q10,2 2,8 Q12,12 20,18Z" fill="#1A1A1A"/>
      <path d="M26,14 Q42,2 48,10 Q40,12 32,18Z" fill="#222"/>
      <path d="M12,20 Q4,24 0,22 Q6,19 12,18Z" fill="#111"/>
    </svg>
  </div>
  <div class="crow2">
    <svg class="crow-svg" viewBox="0 0 52 28" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="26" cy="18" rx="13" ry="7" fill="#111"/>
      <circle cx="40" cy="14" r="6" fill="#111"/>
      <path d="M46,13 L54,12 L46,16Z" fill="#1A1A1A"/>
      <circle cx="42" cy="13" r="1.5" fill="#fff"/>
      <circle cx="43" cy="13" r=".8" fill="#000"/>
      <path d="M26,14 Q10,2 2,8 Q12,12 20,18Z" fill="#1A1A1A"/>
      <path d="M26,14 Q42,2 48,10 Q40,12 32,18Z" fill="#222"/>
      <path d="M12,20 Q4,24 0,22 Q6,19 12,18Z" fill="#111"/>
    </svg>
  </div>

  <!-- ROW 1: Countdown -->
  <div class="hero-countdown-bar">
    <p class="countdown-label">✦ Countdown to Aluth Avurudu Neketha ✦</p>
    <div class="countdown">
      <div class="cd-block">
        <span class="cd-num" id="cd-days">00</span>
        <span class="cd-unit">Days</span>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-block">
        <span class="cd-num" id="cd-hours">00</span>
        <span class="cd-unit">Hours</span>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-block">
        <span class="cd-num" id="cd-mins">00</span>
        <span class="cd-unit">Minutes</span>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-block">
        <span class="cd-num" id="cd-secs">00</span>
        <span class="cd-unit">Seconds</span>
      </div>
    </div>
    <p class="countdown-event">අප්‍රේල් 13–14, 2026 &nbsp;·&nbsp; සිංහල හා දෙමළ අලුත් අවුරුද්ද</p>
  </div>

  <!-- ROW 2: Sun + Title + Divider -->
  <div class="hero-center">
    <div class="sun-wrapper">
      <div class="ray-burst"></div>
      <div class="sun-halo"></div>
      <div class="sun-container">
        <img class="sun-img" src="assets/Aluth Awurudu Soorya PNG.png" alt="Avurudu Sun">
      </div>
    </div>
    <div class="hero-text-block">
      <h1 class="hero-title">
        <span class="line1">Sinhala &amp; Tamil</span>
        <span class="line1">New Year</span>
        <span class="line2">සුභ අලුත් අවුරුදක් වේවා</span>
      </h1>
      <div class="hero-divider">
        <div class="dline"></div>
        <span class="star">✦</span>
        <span class="year-text">2026</span>
        <span class="star">✦</span>
        <div class="dline"></div>
      </div>
    </div>
  </div>

  <!-- ROW 3: BG Switcher -->
  <div class="bg-switcher">
    <div class="bg-dots">
      <div class="bg-dot on" id="dot0" onclick="switchBg(0)" title="Forest"></div>
      <div class="bg-dot" id="dot1" onclick="switchBg(1)" title="Village"></div>
    </div>
  </div>
</section>

<script>
/* ── Custom Cursor ── */
const cursor = document.getElementById('cursor');
const dot    = document.getElementById('cursorDot');
let cx=0, cy=0, dx=0, dy=0;

window.addEventListener('mousemove', e => {
  dx = e.clientX; dy = e.clientY;
  dot.style.left = dx + 'px';
  dot.style.top  = dy + 'px';
});
(function animCursor() {
  cx += (dx - cx) * .12;
  cy += (dy - cy) * .12;
  cursor.style.left = cx + 'px';
  cursor.style.top  = cy + 'px';
  requestAnimationFrame(animCursor);
})();

/* ── Background Switcher ── */
const BG    = ['assets/bg_forest.jpg', 'assets/bg_village.jpg'];
const bgEls = [document.getElementById('bg0'), document.getElementById('bg1')];
bgEls[0].style.backgroundImage = `url('${BG[0]}')`;
bgEls[1].style.backgroundImage = `url('${BG[1]}')`;

/*
  On every page load → always pick the OPPOSITE of last shown bg,
  so it guaranteed alternates each refresh. Falls back to random
  on very first visit. Manual dot clicks also save the choice.
*/
const SESSION_KEY = 'avurudu_bg';
const stored = sessionStorage.getItem(SESSION_KEY);
/* Always switch to the other background on refresh */
let cur = stored !== null
  ? (parseInt(stored, 10) + 1) % BG.length   /* flip to other bg */
  : Math.floor(Math.random() * BG.length);    /* first visit: random */
sessionStorage.setItem(SESSION_KEY, cur);

/* Activate the chosen background */
bgEls[cur].classList.add('active');
document.getElementById('dot' + cur).classList.add('on');
document.getElementById('dot' + (1 - cur)).classList.remove('on');

function switchBg(i) {
  bgEls[cur].classList.remove('active');
  document.getElementById('dot' + cur).classList.remove('on');
  cur = i;
  bgEls[cur].classList.add('active');
  document.getElementById('dot' + cur).classList.add('on');
  sessionStorage.setItem(SESSION_KEY, cur);
}



/* ── Countdown Timer ── */
const TARGET = new Date('2026-04-13T08:30:00+05:30'); // Sri Lanka time
function tick() {
  const diff = TARGET - new Date();
  const g = id => document.getElementById(id);
  if (diff <= 0) {
    ['cd-days','cd-hours','cd-mins','cd-secs'].forEach(id => g(id).textContent = '00');
    return;
  }
  const vals = {
    'cd-days' : Math.floor(diff / 864e5),
    'cd-hours': Math.floor((diff % 864e5) / 36e5),
    'cd-mins' : Math.floor((diff % 36e5) / 6e4),
    'cd-secs' : Math.floor((diff % 6e4) / 1e3)
  };
  for (const [id, val] of Object.entries(vals)) {
    const s = String(val).padStart(2, '0');
    const el = g(id);
    if (el.textContent !== s) {
      el.textContent = s;
      el.classList.remove('update');
      void el.offsetWidth; // force reflow
      el.classList.add('update');
    }
  }
}
tick();
setInterval(tick, 1000);

/* ── Particle System ── */
const canvas = document.getElementById('particles');
const ctx    = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const PCOLS = [
  '#FFD700','#FFE066','#FFC200','#FF8C00','#FFAA33',
  '#D4A017','#B8860B','#A8E060','#7DC950','#4DB840',
  '#FFFFFF','#FFF5CC','#FF6B00'
];
class Drifter {
  constructor(ini) { this.reset(ini); }
  reset(ini) {
    this.x     = Math.random() * W;
    this.y     = ini ? Math.random() * H : (Math.random() < .5 ? H + 5 : -5);
    this.r     = Math.random() * 1.4 + .3;
    this.dx    = (Math.random() - .5) * .38;
    this.dy    = (Math.random() - .5) * .28;
    this.alpha = Math.random() * .35 + .05;
    this.color = PCOLS[Math.floor(Math.random() * PCOLS.length)];
    this.tick  = Math.random() * Math.PI * 2;
    this.speed = Math.random() * .015 + .005;
  }
  update() {
    this.tick += this.speed;
    this.x += this.dx + Math.sin(this.tick) * .32;
    this.y += this.dy;
    if (this.x < -5)  this.x = W + 5;
    if (this.x > W+5) this.x = -5;
    if (this.y < -10 || this.y > H + 10) this.reset(false);
  }
  draw() {
    ctx.save();
    ctx.globalAlpha  = Math.max(0, this.alpha * (.7 + .3 * Math.sin(this.tick)));
    ctx.fillStyle    = this.color;
    ctx.shadowBlur   = 5;
    ctx.shadowColor  = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

const PCLS = [
  '#F9A4C6','#F7C0D8','#F2CDE2','#EFA0BC',
  '#FFCCE6','#FFB8D8','#FFC1E3','#FF90C0'
];
class Petal {
  constructor() { this.reset(true); }
  reset(ini) {
    const side = Math.random() < .5;
    this.x      = side ? Math.random() * W * .2 : W * (1 - Math.random() * .2);
    this.y      = ini ? Math.random() * H : -14;
    this.w      = Math.random() * 11 + 4;
    this.h      = this.w * (.55 + Math.random() * .3);
    this.color  = PCLS[Math.floor(Math.random() * PCLS.length)];
    this.angle  = Math.random() * Math.PI * 2;
    this.spin   = (Math.random() - .5) * .065;
    this.vy     = Math.random() * 1.3 + .65;
    this.vx     = (Math.random() - .5) * .7;
    this.swing  = Math.random() * Math.PI * 2;
    this.swingS = Math.random() * .026 + .012;
    this.alpha  = .7 + Math.random() * .3;
    this.fadeIn = ini ? 1 : 0;
  }
  update() {
    this.swing  += this.swingS;
    this.x      += this.vx + Math.sin(this.swing) * .95;
    this.y      += this.vy;
    this.angle  += this.spin;
    if (this.fadeIn < 1) this.fadeIn = Math.min(1, this.fadeIn + .04);
    if (this.y > H + 16) this.reset(false);
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha * this.fadeIn;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.fillStyle   = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur  = 5;
    ctx.beginPath();
    ctx.ellipse(0, 0, this.w / 2, this.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

const drifters = Array.from({ length: 80 }, (_, i) => new Drifter(i < 70));
const petals   = Array.from({ length: 45 }, () => new Petal());

(function animP() {
  ctx.clearRect(0, 0, W, H);
  drifters.forEach(d => { d.update(); d.draw(); });
  petals.forEach(p   => { p.update(); p.draw(); });
  requestAnimationFrame(animP);
})();

/* ── Fireworks ── */
const FC = ['#D4A017','#FF8C00','#FFD700','#7DC950','#A8E060','#FFE066','#FFFFFF','#FF6FA8','#4DFFC3'];
function fw(x, y) {
  for (let i = 0; i < 22; i++) {
    const el  = document.createElement('div');
    el.className = 'firework';
    const a   = (i / 22) * Math.PI * 2;
    const d   = 55 + Math.random() * 90;
    el.style.cssText = [
      `left:${x}px`, `top:${y}px`,
      `background:${FC[Math.floor(Math.random() * FC.length)]}`,
      `--translate:translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px)`,
      `animation-duration:${.5 + Math.random() * .85}s`,
      `width:${3 + Math.random() * 5}px`,
      `height:${3 + Math.random() * 5}px`
    ].join(';');
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

document.addEventListener('click', e => fw(e.clientX, e.clientY));

/* Auto-fireworks near the sun */
setInterval(() => {
  const s = document.querySelector('.sun-wrapper');
  if (!s) return;
  const r = s.getBoundingClientRect();
  fw(
    r.left + r.width / 2 + (Math.random() - .5) * r.width * .7,
    r.top  + r.height/ 2 + (Math.random() - .5) * r.height* .7
  );
}, 2800);

/* Touch-based fireworks for mobile */
document.addEventListener('touchstart', e => {
  const t = e.touches[0];
  fw(t.clientX, t.clientY);
}, { passive: true });
</script>
